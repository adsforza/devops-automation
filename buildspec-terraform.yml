version: 0.2
phases:
  install:
    commands:
      - curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor | tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
      - echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(. /etc/os-release && echo $VERSION_CODENAME) main" | tee /etc/apt/sources.list.d/hashicorp.list
      - apt-get update && apt-get install -y terraform jq
  build:
    commands:
      - cd infrastructure/terraform
      - terraform init -input=false
      - terraform plan -input=false -out=tfplan
  post_build:
    commands:
      - |
        if [ "$APPLY" = "true" ]; then
          terraform apply -input=false -auto-approve tfplan
        else
          echo "Skipping apply (set APPLY=true to enable)"
        fi
artifacts:
  files:
    - infrastructure/terraform/**
  discard-paths: no
env:
  variables:
    APPLY: "false"